<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploading - BitStream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2c6e49 0%, #4caf50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        
        .upload-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .status {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            height: 50px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #fff, rgba(255, 255, 255, 0.8));
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c6e49;
            font-size: 18px;
        }
        
        .file-info {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 15px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="logo">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="90" fill="white" opacity="0.3"/>
                <path d="M100 40 L100 140 M70 110 L100 140 L130 110" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>
        
        <h1>Uploading Media</h1>
        <p class="status"><span class="spinner"></span><span id="status-text">Preparing upload...</span></p>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">0%</div>
        </div>
        
        <p class="file-info" id="file-info">Initializing...</p>
    </div>
    
    <script>
        // This page should receive the form data and handle the upload
        console.log('Upload progress page loaded');
    </script>
</body>
</html>
